name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # restrictive default; docker job overrides below

jobs:
  # ---------------------------------------------------------------------------
  # Go build + vet
  # ---------------------------------------------------------------------------
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # GoReleaser config validation
  # ---------------------------------------------------------------------------
  goreleaser-check:
    name: GoReleaser config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: check

  # ---------------------------------------------------------------------------
  # Docker image — build on every push to main, tagged with the short SHA.
  # Skipped on pull requests (no write access to the registry from forks).
  # ---------------------------------------------------------------------------
  docker:
    name: Build & push image (sha tag)
    runs-on: ubuntu-latest
    needs: [build]          # only push if the Go build is green
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write    # push to ghcr.io
      id-token: write    # keyless cosign signing (OIDC token)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # short SHA, e.g. sha-a1b2c3d
            type=sha,format=short
            # rolling "edge" tag always points to the latest main commit
            type=raw,value=edge

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
